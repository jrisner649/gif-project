<h2 mat-dialog-title>Add GIF</h2>
<mat-dialog-content class="mat-typography">
  <div class="flex-container">
    <mat-form-field style="flex: 1">

        <mat-label>Copy/paste GIF link</mat-label>
        <input matInput type="text" [(ngModel)]="link">
    </mat-form-field>
  </div>
      <img
        [src]="link + '.gif'"
      >

</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton="outlined" mat-dialog-close>Cancel</button>
  <button matButton="filled" [mat-dialog-close]="true" cdkFocusInitial>Confirm</button>
</mat-dialog-actions>
